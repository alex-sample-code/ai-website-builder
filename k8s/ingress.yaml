apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-wb-ingress
  namespace: ai-website-builder
  annotations:
    # ALB Configuration
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    # CloudFront connects via HTTP:80, no SSL redirect needed

    # Certificate Configuration
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:959545103699:certificate/a511b177-c1c2-4c71-85f3-b148f6b6586e

    # Security Group Configuration
    alb.ingress.kubernetes.io/security-groups: sg-0889572eb6e1239a0

    # Health Check Configuration
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'

    # Load Balancer Attributes
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60

    # Tags
    alb.ingress.kubernetes.io/tags: Project=ai-website-builder,Environment=production
spec:
  ingressClassName: alb
  rules:
  # API domain
  - host: api.chinabjalex.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000

  # Main domain
  - host: www.chinabjalex.com
    http:
      paths:
      # API requests go to backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      # Everything else goes to frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
