apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-website-builder
  labels:
    app: backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      serviceAccountName: ai-wb-service-account
      containers:
      - name: backend
        image: 959545103699.dkr.ecr.us-east-1.amazonaws.com/ai-website-builder/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-wb-secrets
              key: database-url

        # Redis Configuration
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-wb-secrets
              key: redis-url

        # AWS Configuration from ConfigMap
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: AWS_REGION
        - name: AWS_ACCOUNT_ID
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: AWS_ACCOUNT_ID

        # S3 Buckets
        - name: S3_SITES_BUCKET
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: S3_SITES_BUCKET
        - name: S3_ASSETS_BUCKET
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: S3_ASSETS_BUCKET
        - name: S3_TEMPLATES_BUCKET
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: S3_TEMPLATES_BUCKET

        # DynamoDB Tables
        - name: DYNAMODB_PAGE_VIEWS_TABLE
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: DYNAMODB_PAGE_VIEWS_TABLE
        - name: DYNAMODB_PAGE_VIEW_DAILY_TABLE
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: DYNAMODB_PAGE_VIEW_DAILY_TABLE

        # Cognito Configuration
        - name: COGNITO_USER_POOL_ID
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: COGNITO_USER_POOL_ID
        - name: COGNITO_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: COGNITO_CLIENT_ID
        - name: COGNITO_REGION
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: COGNITO_REGION

        # Application Configuration
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: LOG_LEVEL
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: DEBUG

        # CloudFront Configuration
        - name: CLOUDFRONT_DISTRIBUTION_ID
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: CLOUDFRONT_DISTRIBUTION_ID
        - name: CLOUDFRONT_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: CLOUDFRONT_DOMAIN

        # Bedrock AI
        - name: BEDROCK_REGION
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: BEDROCK_REGION
        - name: BEDROCK_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: BEDROCK_MODEL_ID

        # Email (SES)
        - name: SES_SENDER_EMAIL
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: SES_SENDER_EMAIL
        - name: SES_REGION
          valueFrom:
            configMapKeyRef:
              name: ai-wb-config
              key: SES_REGION

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            httpHeaders:
            - name: Host
              value: api.chinabjalex.com
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            httpHeaders:
            - name: Host
              value: api.chinabjalex.com
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

      restartPolicy: Always
