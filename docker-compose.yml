version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: ai-wb-postgres
    environment:
      POSTGRES_DB: ai_website_builder
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_website_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-wb-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: ai-wb-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-wb-network

  # LocalStack for AWS services (S3, DynamoDB)
  localstack:
    image: localstack/localstack:latest
    container_name: ai-wb-localstack
    environment:
      SERVICES: s3,dynamodb
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
      - "4571:4571"
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai-wb-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-wb-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/ai_website_builder
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_SITES_BUCKET: ai-wb-sites-local
      S3_ASSETS_BUCKET: ai-wb-assets-local
      S3_TEMPLATES_BUCKET: ai-wb-templates-local
      DYNAMODB_PAGE_VIEWS_TABLE: ai-wb-page-views
      DYNAMODB_PAGE_VIEW_DAILY_TABLE: ai-wb-page-view-daily
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - ai-wb-network

  # Frontend (React)
  frontend:
    image: node:20-alpine
    container_name: ai-wb-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ai-wb-network

volumes:
  postgres_data:
  redis_data:
  localstack_data:

networks:
  ai-wb-network:
    driver: bridge
